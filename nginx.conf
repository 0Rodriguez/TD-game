# Nginx config for the frontend container.
# Serves the static Phaser bundle AND proxies /api/* to the backend service
# at backend:3000 (resolved via Docker Compose's internal DNS).

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Static SPA: serve the bundle, fall through to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → backend container
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Fail fast if the backend is unreachable so the UI's 4 s timeout still applies.
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── Long-cache static assets (Vite emits content-hashed filenames)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
