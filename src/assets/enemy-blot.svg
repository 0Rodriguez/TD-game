<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- ══ Main ink blob (irregular polygon) ══ -->
  <polygon points="16,2 21,4 26,8 29,14 27,20 23,27 16,29 10,27 5,21 4,14 7,7 12,3"
           fill="#0d0d3a" stroke="#111" stroke-width="0.7" opacity="0.96"/>

  <!-- Inner lighter zone (simulates ink depth / wet sheen) -->
  <polygon points="16,5 20,7 24,12 23,18 19,24 14,23 9,18 9,11 13,6"
           fill="#1a1a55" opacity="0.50"/>

  <!-- Specular highlight (light catching the wet ink surface) -->
  <ellipse cx="11" cy="10" rx="4" ry="2.5"
           fill="#3333aa" opacity="0.28" transform="rotate(-25 11 10)"/>

  <!-- ══ Satellite blots / splatters ══ -->
  <circle cx="27" cy="8"  r="2.2" fill="#0d0d3a" opacity="0.88"/>
  <circle cx="4"  cy="22" r="1.7" fill="#0d0d3a" opacity="0.78"/>
  <circle cx="28" cy="23" r="1.4" fill="#0d0d3a" opacity="0.72"/>
  <circle cx="7"  cy="3"  r="2.0" fill="#0d0d3a" opacity="0.82"/>
  <circle cx="25" cy="29" r="1.5" fill="#0d0d3a" opacity="0.68"/>

  <!-- Ink drip tendril at bottom -->
  <ellipse cx="16" cy="30" rx="2.2" ry="2.8" fill="#0d0d3a" opacity="0.82"/>

</svg>
