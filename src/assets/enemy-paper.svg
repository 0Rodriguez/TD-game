<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- ══ Paper ball base (slightly irregular ellipse) ══ -->
  <ellipse cx="16" cy="16" rx="13" ry="13.5"
           fill="#f0ece4" stroke="#2a2a2a" stroke-width="1.3"/>
  <!-- Sketch wobble second outline -->
  <ellipse cx="15.7" cy="16.3" rx="13.3" ry="13"
           fill="none" stroke="#666" stroke-width="0.5" opacity="0.35"/>

  <!-- ══ Crumple / fold lines (bezier curves across the ball) ══ -->
  <path d="M 7,9 Q 16,13 23,7"
        fill="none" stroke="#2a2a2a" stroke-width="1.0" opacity="0.70" stroke-linecap="round"/>
  <path d="M 4,15 Q 11,19 9,25"
        fill="none" stroke="#2a2a2a" stroke-width="0.9" opacity="0.65" stroke-linecap="round"/>
  <path d="M 13,27 Q 21,23 27,25"
        fill="none" stroke="#2a2a2a" stroke-width="0.9" opacity="0.65" stroke-linecap="round"/>
  <path d="M 18,4 Q 14,16 19,28"
        fill="none" stroke="#2a2a2a" stroke-width="0.8" opacity="0.55" stroke-linecap="round"/>
  <path d="M 26,12 Q 20,17 24,24"
        fill="none" stroke="#2a2a2a" stroke-width="0.7" opacity="0.50" stroke-linecap="round"/>

  <!-- ══ Crosshatch shading — top-left section ══ -->
  <line x1="6"  y1="9"  x2="10" y2="5"  stroke="#555" stroke-width="0.6" opacity="0.28"/>
  <line x1="8"  y1="11" x2="13" y2="6"  stroke="#555" stroke-width="0.6" opacity="0.28"/>
  <line x1="10" y1="13" x2="16" y2="7"  stroke="#555" stroke-width="0.6" opacity="0.22"/>

  <!-- ══ Shading — bottom-right section ══ -->
  <line x1="21" y1="22" x2="26" y2="17" stroke="#555" stroke-width="0.6" opacity="0.25"/>
  <line x1="23" y1="25" x2="28" y2="20" stroke="#555" stroke-width="0.6" opacity="0.22"/>

</svg>
