<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">

  <!-- ══ ERASER (warm pink, rounded top) ══ -->
  <rect x="16.5" y="33" width="7" height="6.5" rx="2"
        fill="#e8a0a0" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- sketch wobble pass -->
  <rect x="16" y="32.7" width="8" height="7" rx="2"
        fill="none" stroke="#666" stroke-width="0.5" opacity="0.35"/>

  <!-- ══ FERRULE (silvery metal band) ══ -->
  <rect x="16" y="28.5" width="8" height="4.5"
        fill="#aaaaaa" stroke="#2a2a2a" stroke-width="1.15"/>
  <!-- center crease line -->
  <line x1="16" y1="30.8" x2="24" y2="30.8"
        stroke="#2a2a2a" stroke-width="0.6" opacity="0.55"/>
  <!-- slight shading on right half -->
  <rect x="20" y="28.5" width="4" height="4.5"
        fill="#888888" opacity="0.2"/>

  <!-- ══ YELLOW BODY ══ -->
  <rect x="16" y="8.5" width="8" height="20"
        fill="#f5d060" stroke="#2a2a2a" stroke-width="1.3"/>
  <!-- sketch wobble -->
  <rect x="15.4" y="8.8" width="9.2" height="20"
        fill="none" stroke="#666" stroke-width="0.55" opacity="0.28"/>
  <!-- wood grain lines -->
  <line x1="18.5" y1="10" x2="18.5" y2="28"
        stroke="#c8a020" stroke-width="0.75" opacity="0.55"/>
  <line x1="21.5" y1="10" x2="21.5" y2="28"
        stroke="#c8a020" stroke-width="0.75" opacity="0.55"/>

  <!-- ══ WOOD TAPER (shaved section) ══ -->
  <polygon points="16,8.5 24,8.5 20,2.5"
           fill="#d4a030" stroke="#2a2a2a" stroke-width="1.2"
           stroke-linejoin="round"/>
  <!-- sketch wobble pass -->
  <polygon points="15.5,8.8 24.5,8.2 20,2"
           fill="none" stroke="#666" stroke-width="0.5" opacity="0.35"
           stroke-linejoin="round"/>
  <!-- cross-hatch line on taper -->
  <line x1="17.4" y1="6.0" x2="22.6" y2="6.0"
        stroke="#aa7a10" stroke-width="0.7" opacity="0.45"/>
  <line x1="16.8" y1="7.5" x2="23.2" y2="7.5"
        stroke="#aa7a10" stroke-width="0.5" opacity="0.35"/>

  <!-- ══ GRAPHITE TIP ══ -->
  <polygon points="19.2,2.5 20.8,2.5 20,0.5"
           fill="#1a1a1a"/>
  <!-- slight wobble outline -->
  <polygon points="18.9,2.8 21.1,2.3 20,0.2"
           fill="none" stroke="#333" stroke-width="0.4" opacity="0.5"/>

</svg>
